spring.application.name=gateway-cp

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/asg_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&useUnicode=true&characterEncoding=UTF-8}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Server
server.address=${GATEWAY_IP:0.0.0.0}
server.port=${SERVER_PORT:8080}

# Logging
logging.level.vn.asg=${LOG_LEVEL_ASG:DEBUG}
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n